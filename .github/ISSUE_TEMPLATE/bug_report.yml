name: 🐛 Reporte de bug
description: Reporta un error en el sitio de ARANET
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar un bug. Por favor completa los siguientes campos para ayudarnos a reproducirlo.
  - type: textarea
    id: description
    attributes:
      label: Descripción del problema
      description: ¿Qué ocurrió? ¿Qué esperabas que ocurriera?
      placeholder: Al hacer clic en el plan Premium no se muestra el precio…
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a '/'
        2. Click en '...'
        3. Ver el error
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL afectada
      placeholder: https://aranet-sigma.vercel.app/sobre-nosotros
  - type: dropdown
    id: device
    attributes:
      label: Dispositivo
      options:
        - Desktop
        - Móvil
        - Tablet
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Navegador y versión
      placeholder: Chrome 132, Safari 18, Firefox 134…
  - type: textarea
    id: extra
    attributes:
      label: Capturas o contexto adicional
